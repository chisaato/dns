---
- name: DNS 项目配置生成
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: 加载默认变量
      ansible.builtin.include_vars:
        file: default/default.yml
      failed_when: false
    - name: 加载用户覆盖变量
      ansible.builtin.include_vars:
        file: ../vars.yml
  tasks:
    - name: 创建必要目录
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - dnsdist/lua
        - dnsdist/lists
        - rule-builder

    - name: 确保 mac-local.txt 存在
      ansible.builtin.file:
        path: dnsdist/lists/mac-local.txt
        state: touch
        mode: "0644"

    - name: 渲染 dnsdist.conf
      ansible.builtin.template:
        src: dnsdist.conf.j2
        dest: dnsdist/dnsdist.conf
        mode: "0644"

    - name: 渲染 rule-builder/config.yaml
      ansible.builtin.template:
        src: rule-builder-config.yaml.j2
        dest: rule-builder/config.yaml
        mode: "0644"

    - name: 写入劫持域名列表文件
      ansible.builtin.copy:
        content: "{{ item.domains | join('\n') }}\n"
        dest: "dnsdist/lists/hijack-{{ item.name }}.txt"
        mode: "0644"
      loop: "{{ dnsdist_custom_forwarding | default([]) }}"
      loop_control:
        label: "hijack-{{ item.name }}.txt"

    - name: 告知配置生成完毕
      ansible.builtin.debug:
        msg:
          - "配置生成完毕"
          - "运行 ./manual-update-res.sh 生成列表"
          - "运行 docker compose up -d 启动服务"
