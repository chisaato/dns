---
# dnsdist 配置（全加密出口，无明文 UDP）
dnsdist_listen: "0.0.0.0:1853"
dnsdist_listen_plain: "0.0.0.0:1753"
dnsdist_acl:
  - "0.0.0.0/0"
  - "::/0"

# dnsdist 上游公共 DNS 服务器（可提交到 Git）
# URL 格式，自动识别协议：
#   https://host:port/path  → DoH
#   quic://host:port        → DoQ
#   tls://host:port         → DoT
#   h3://host:port/path     → DoH3
#   tcp://host:port         → 明文 TCP
#   host:port               → 明文 UDP（默认）
dnsdist_servers:
  cn_doh:
    - 'https://1.12.12.12/dns-query'
    - 'https://120.53.53.53/dns-query'
    - 'https://223.5.5.5/dns-query'
    - 'https://223.6.6.6/dns-query'

# dnsdist 私有上游 DNS 服务器（不要提交到 Git！在 vars.yml 中覆盖）
# 同上 URL 格式。模板中使用的 pool 名称：
#   self_doh        — 自建公网 AdGuard（带过滤）
#   self_no_filter  — 自建无过滤 DoH
#   overseas_doh    — CF 隧道反代海外 DoH（托底用）
#
# 示例：
# dnsdist_private_servers:
#   self_doh:
#     - 'https://example.com:4215/dns-query'
#   self_no_filter:
#     - 'https://example.com:4215/dns-query/no-filter'
#   overseas_doh:
#     - 'https://tunnel.example.com:8443/path/dns-query'
dnsdist_private_servers: {}

# dnsdist MAC 列表来源
mac_clean_url: ""

# dnsdist 规则链功能开关
dnsdist_enable_mac_observation: true
dnsdist_enable_allowlist: true
dnsdist_enable_blocklist: true

# dnsdist 本地劫持转发（数组，为空则不启用）
# 用途：内网服务不走外网。对所有 LAN 设备生效，不区分 MAC。
# 格式：
# dnsdist_custom_forwarding:
#   - name: "internal"
#     domains:
#       - "internal.example.com"
#     upstream:
#       - "192.168.1.1:53"
#     block_type_https: true
dnsdist_custom_forwarding: []

# dnsdist 持久化缓存（避免重启冷启动延迟）
dnsdist_persistent_cache_enabled: true
dnsdist_persistent_cache_dir: "/etc/dnsdist/cache"
dnsdist_persistent_cache_save_interval: 300
