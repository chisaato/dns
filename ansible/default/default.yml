---
# Bootstrap DNS（adg_forward 共享，必须纯 IP 避免循环依赖）
bootstrap_dns:
  - https://1.12.12.12/dns-query
  - https://120.53.53.53/dns-query
  - https://223.5.5.5/dns-query
  - https://223.6.6.6/dns-query

# mosdns 监听端口
mosdns_default_listen: 1853
mosdns_clean_listen: 1753

# 自建非过滤转发（非净化 MAC / 应急链路走这个）
mosdns_self_no_filter_upstream:
  - https://example.com:443/dns-query

# 自建洁净过滤转发（净化设备的国内域名走这个）
mosdns_self_clean_upstream:
  - https://example.com:443/dns-query

# 海外转发（净化设备的非国内域名走这个）
mosdns_oversea_upstream:
  - https://1.1.1.1/dns-query

# 国内普通转发（兜底）
mosdns_cn_normal_upstream:
  - https://doh.pub/dns-query
  - https://1.12.12.12/dns-query
  - https://120.53.53.53/dns-query
  - https://223.5.5.5/dns-query
  - https://dns.alidns.com/dns-query

# AdGuard 过滤规则列表（adg_filter 直接内置使用）
adguard_filters:
  - enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: "AdGuard DNS filter"
    id: 1
adguard_whitelist_filters: []

# 远程文件下载源
geosite_dat_url: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
mac_address_remote_url: ""

# 自定义域名转发（可选）
mosdns_custom_forwarding: {}
